{% extends 'base.html' %}

{% block content %}
<div class="container my-4" id="main-container" v-cloak>
    <template v-if="fetch_all_pages">
        <div class="explorer-banner mb-4">
            <i class="fa-solid fa-link banner-watermark"></i>
            <div class="d-flex align-items-center gap-3 mb-3">
                <div class="banner-icon">
                    <i class="fa-solid fa-link"></i>
                </div>
                <div>
                    <h2 class="fw-bold mb-1">Update Rule Similarities</h2>
                    <div class="banner-accent"></div>
                </div>
            </div>
            <p class="text-muted mb-0" style="max-width: 600px; font-size: 0.95rem;">
                Compute and refresh similarity scores between rules using TF-IDF and fuzzy matching.
            </p>
        </div>

        <ul class="nav nav-underline justify-content-center w-100 mb-4" id="updateTabs" role="tablist">
            <li class="nav-item flex-fill text-center"><a class="nav-link active" data-bs-toggle="tab"
                    href="#global-pane">Global Similarity</a></li>
            <li class="nav-item flex-fill text-center"><a class="nav-link" data-bs-toggle="tab"
                    href="#filtered-pane">Udpated Rules Similarity</a></li>
            <li class="nav-item flex-fill text-center"><a class="nav-link" data-bs-toggle="tab"
                    href="#history-pane">History<span class="badge bg-danger rounded-pill ms-1"
                        v-cloak>[[running_sessions.length]]</span></a>

            </li>
        </ul>

        <div class="tab-content" id="updateTabsContent">
            <!-- Global Similarity -->
            <div class="tab-pane fade show active" id="global-pane" role="tabpanel">
                <div class="card border-0 shadow-sm p-4">
                    <h5 class="fw-bold mb-4">Global Similarity</h5>

                    <div v-if="loading_global" class="text-center py-5">
                        <div class="spinner-grow text-success" role="status"></div>
                    </div>

                    <div v-else class="animate__animated animate__fadeIn">
                        <similar-rules-filter v-model:score="global_min_score" v-model:format="global_format"
                            v-model:source-mode="global_source_mode" v-model:author-mode="global_author_mode"
                            @filter="fetchGlobalDuplicates(1)">
                        </similar-rules-filter>
                        <template v-if="global_duplicates.length > 0">
                            <pagination-component v-if="global_total_pages > 1" :current-page="global_page"
                                :total-pages="global_total_pages" @change-page="(p) => fetchGlobalDuplicates(p)">
                            </pagination-component>

                            <similar-rule-card v-for="(pair, index) in global_duplicates" :key="'glob-' + index"
                                :rule-a="pair.rule_a_data" :rule-b="pair.rule_b_data" :score="pair.score" type="global"
                                :unique-id="'glob-' + index" @refresh-list="fetchGlobalDuplicates(1)"
                                :is-admin="{{ 'true' if current_user.is_admin() else 'false' }}">
                            </similar-rule-card>

                            <pagination-component v-if="global_total_pages > 1" :current-page="global_page"
                                :total-pages="global_total_pages" @change-page="(p) => fetchGlobalDuplicates(p)">
                            </pagination-component>
                        </template>

                        <template v-else>
                            <div class="text-center py-5">
                                <p class="text-muted">No similar rules found.</p>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <!-- Filtered Results -->
            <div class="tab-pane fade" id="filtered-pane" role="tabpanel">
                <div class="card border-0 shadow-sm p-4">
                    <h5 class="fw-bold mb-4">Batch Processing Interface</h5>

                    <rule-selection-table api-endpoint="/rule/get_rules_page_filter"
                        submit-endpoint="/rule/similar_rules/update" is-similarity-update="true"
                        csrf-token="{{ csrf_token() }}">
                    </rule-selection-table>

                </div>
            </div>

            <!-- History -->
            <div class="tab-pane fade" id="history-pane" role="tabpanel">
                <div class="card border-0 shadow-sm p-4">
                    <h5 class="fw-bold mb-4">Update History</h5>

                    <!-- In progress-->
                    <button type="button" class="btn btn-outline-primary float-end position-relative"
                        data-bs-toggle="modal" data-bs-target="#staticBackdrop">
                        Running
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                            v-cloak>
                            [[running_sessions.length]]
                            <span class="visually-hidden">unread messages</span>
                        </span>
                    </button>
                    <div class="modal fade" id="staticBackdrop" tabindex="-1" aria-labelledby="staticBackdropLabel"
                        aria-hidden="true">
                        <div class="modal-dialog modal-lg">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h1 class="modal-title fs-5" id="staticBackdropLabel">Running Sessions</h1>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"
                                        aria-label="Close"></button>
                                </div>

                                <div class="modal-body">
                                    <div class="table-responsive">
                                        <table class="table table-hover align-middle">
                                            <thead class="table-light">
                                                <tr>
                                                    <th class="text-center">Date & Time</th>
                                                    <th class="text-center">Step</th>
                                                    <th class="text-center">Mode</th>
                                                    <th class="text-center">Description</th>
                                                    <th class="text-end pe-4">%</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <!-- Import sessions -->
                                                <tr v-for="(running, index) in running_sessions"
                                                    :key="'import-' + index" @click="goto(running.uuid)"
                                                    style="cursor: pointer;" class="table-info">
                                                    <td class="text-center">
                                                        [[ formatDate(running.date_time) || running.date_time || 'N/A'
                                                        ]]
                                                    </td>
                                                    <td class="text-center text-capitalize">[[ running.step ||
                                                        'N/A' ]]</td>
                                                    <td class="text-center">
                                                        <!-- badge by mode global or filtered -->
                                                        <span
                                                            :class="['badge rounded-pill px-3', running.mode === 'global' ? 'bg-primary' : 'bg-info text-dark']">
                                                            [[ running.mode.toUpperCase() ]]
                                                        </span>
                                                    </td>
                                                    <td class="text-center">
                                                        [[ running.info || 'N/A' ]]
                                                    </td>
                                                    <td>
                                                        <div class="progress">
                                                            <div class="progress-bar bg-info" role="progressbar"
                                                                :style="'width: ' + running.percentage + '%'"
                                                                :aria-valuenow="running.percentage" aria-valuemin="0"
                                                                aria-valuemax="100"></div>

                                                        </div>
                                                        <span>
                                                            [[ running.percentage || 'N/A' ]] %
                                                        </span>
                                                    </td>
                                                </tr>

                                                <!-- No sessions -->
                                                <tr v-if="running_sessions.length === 0">
                                                    <td colspan="5" class="text-center text-muted py-3">
                                                        No running sessions at the moment.
                                                    </td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary"
                                        data-bs-dismiss="modal">Close</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- History-->
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th class="ps-4">Date & Time</th>
                                    <th>Mode</th>
                                    <th>Description</th>
                                    <th class="text-center">Processed</th>
                                    <th class="text-center">Pairs</th>
                                    <th class="text-end pe-4">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr v-for="(item, index) in history_list" :key="item.uuid" @click="goto(item.uuid)"
                                    style="cursor: pointer;">
                                    <td class="ps-4">
                                        <div class="fw-bold">[[ formatDate(item.date) ]]</div>
                                        <div class="small text-muted">[[ formatTime(item.date) ]]</div>
                                    </td>
                                    <td>
                                        <span
                                            :class="['badge rounded-pill px-3', item.mode === 'global' ? 'bg-primary' : 'bg-info text-dark']">
                                            [[ item.mode.toUpperCase() ]]
                                        </span>
                                    </td>
                                    <td class="small text-truncate" style="max-width: 200px;">[[ item.info ]]</td>
                                    <td class="text-center fw-semibold">[[ item.total_rules_processed ]]</td>
                                    <td class="text-center">[[ item.similar_pairs_found ]]</td>
                                    <td class="text-end pe-4" @click.stop>
                                        <button class="btn btn-link text-danger p-0" @click="prepDelete(item, index)">
                                            <i class="fa-solid fa-trash"></i>
                                        </button>
                                    </td>
                                </tr>
                                <tr v-if="history_list.length === 0">
                                    <td colspan="6" class="text-center py-5 text-muted">No records found.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div v-if="total_pages > 1" class="mt-4">
                        <pagination-component :current-page="current_page" :total-pages="total_pages"
                            @change-page="changePage"></pagination-component>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow-lg" style="border-radius: 15px;" v-if="itemToDelete">
                    <div class="modal-header border-0 pb-0">
                        <h5 class="modal-title fw-bold">Confirm Deletion</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body py-4 text-center">
                        <div class="text-danger mb-3"><i class="fas fa-exclamation-triangle fa-3x"></i></div>
                        <p class="mb-0">Are you sure you want to delete this record?<br>
                            <strong>[[ itemToDelete.uuid.substring(0,8) ]]...</strong>
                        </p>
                    </div>
                    <div class="modal-footer border-0 pt-0 justify-content-center">
                        <button type="button" class="btn btn-light rounded-pill px-4"
                            data-bs-dismiss="modal">Cancel</button>
                        <button class="btn btn-danger rounded-pill px-4" @click="confirmDelete">Confirm Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </template>
    <template v-else>
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </template>
</div>
{% endblock %}

{% block script %}
<script type="module">
    const { createApp, ref, onMounted, computed, nextTick } = Vue;
    import { create_message, message_list } from '/static/js/toaster.js';
    import PaginationComponent from '/static/js/rule/paginationComponent.js';
    import RuleSelectionTable from '/static/js/rule/ruleSelectionTable.js';
    import DiffDisplay from '/static/js/codeMirror/diffDisplay.js';
    import SimilarRuleCard from '/static/js/rule/similarity/similarRulesCard.js';
    import SimilarRulesFilter from '/static/js/rule/similarity/similarRulesFilter.js';
    createApp({
        delimiters: ['[[', ']]'],
        components: {
            'diff-display': DiffDisplay,
            'pagination-component': PaginationComponent,
            'similar-rule-card': SimilarRuleCard,
            'rule-selection-table': RuleSelectionTable,
            'similar-rules-filter': SimilarRulesFilter
        },
        setup() {
            const fetch_all_pages = ref(false);

            async function init() {
                fetch_all_pages.value = false

                await Promise.all([
                    fetchHistory(1),
                    fetchInProgress(),
                    fetchGlobalDuplicates(1)
                ])
                await nextTick();

                fetch_all_pages.value = true
            }

            onMounted(() => {
                init()
            })





            /**
             * #################
             * # Fetch History #
             * #################
             * */
            // History

            const history_list = ref([]);
            const current_page = ref(1);
            const total_pages = ref(1);

            async function fetchHistory(page) {
                const res = await fetch(`/rule/history_updater/list?page=${page}`);
                const data = await res.json();
                if (res.status === 200) {
                    history_list.value = data.history || [];
                    total_pages.value = data.total_pages || 1;
                    current_page.value = page;
                } else {
                    history_list.value = [];
                    total_pages.value = 1;
                    current_page.value = 1;
                    create_message("Error fetching history", "danger-subtle");
                }
            }

            // In progress

            const running_sessions = ref({});

            async function fetchInProgress() {
                const res = await fetch(`/rule/history_updater/list_in_progress`);
                const data = await res.json();
                if (res.status === 200) {
                    running_sessions.value = data.history || {};
                }
            }

            /**
             * ##################
             * # Action History #
             * ##################
             * */

            const itemToDelete = ref(null);
            const indexToDelete = ref(null);
            let bsModal = null;
            const prepDelete = (item, index) => {
                itemToDelete.value = item;
                indexToDelete.value = index;
                if (!bsModal) bsModal = new bootstrap.Modal(document.getElementById('deleteModal'));
                bsModal.show();
            };

            async function confirmDelete() {
                try {
                    const res = await fetch(`/rule/history_updater/delete/${itemToDelete.value.uuid}`);
                    if (res.ok) {
                        history_list.value.splice(indexToDelete.value, 1);
                        create_message("History deleted", "success-subtle");
                    }
                } catch (e) {
                    create_message("Error during deletion", "danger-subtle");
                } finally {
                    bsModal.hide();
                    itemToDelete.value = null;
                }
            };

            /**
             * #################
             * # Global Update #
             * #################
             * */

            const global_duplicates = ref([]);
            const global_page = ref(1);
            const global_total_pages = ref(1);
            const loading_global = ref(false);

            const global_min_score = ref(0.80);
            const global_format = ref('');
            const global_source_mode = ref('all');
            const global_author_mode = ref('all');

            async function fetchGlobalDuplicates(page = 1) {
                loading_global.value = true;
                const params = new URLSearchParams({
                    page: page,
                    min_score: global_min_score.value,
                    format: global_format.value,
                    source_mode: global_source_mode.value,
                    author_mode: global_author_mode.value
                });
                const res = await fetch(`/rule/similar_global_duplicates?${params.toString()}`);
                if (res.ok) {
                    const data = await res.json();

                    global_duplicates.value = data.items;
                    global_page.value = data.current_page || page;
                    global_total_pages.value = Math.ceil(data.total / 20);
                }
                loading_global.value = false;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }


            /**
             * ################
             * # Utilities    #
             * ################
             * */

            const changePage = (p) => fetchHistory(p);
            const goto = (uuid) => window.location.href = `/rule/similar_loading/${uuid}`;
            const formatDate = (d) => new Date(d).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
            const formatTime = (d) => new Date(d).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

            return {
                history_list, current_page, total_pages,
                formatDate, formatTime, fetchHistory, changePage, goto,
                prepDelete, confirmDelete, itemToDelete,
                message_list, fetch_all_pages, running_sessions, fetchInProgress,
                RuleSelectionTable,

                global_duplicates, global_page, global_total_pages, loading_global, fetchGlobalDuplicates,
                SimilarRuleCard, global_min_score, SimilarRulesFilter, global_format, global_source_mode, global_author_mode
            };
        }
    }).mount('#main-container');
</script>
{% endblock %}
