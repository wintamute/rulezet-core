{% extends 'base.html' %}

{% block content %}
<div class="container-fluid mt-3 px-4" id="main-container">

    <!-- Page header -->
    <div class="explorer-banner mb-4">
        <i class="fa-solid fa-tags banner-watermark"></i>
        <div class="d-flex align-items-center gap-3 mb-3">
            <div class="banner-icon">
                <i class="fa-solid fa-tags"></i>
            </div>
            <div>
                <h2 class="fw-bold mb-1">Tag Management</h2>
                <div class="banner-accent"></div>
            </div>
        </div>
        <p class="text-muted mb-0" style="max-width: 600px; font-size: 0.95rem;">
            Manage tags, taxonomies, and galaxies used across all detection rules.
        </p>
    </div>

    <div v-if="!ready" class="text-center py-5">
        <div class="spinner-border text-primary mb-3" role="status"></div>
        <p class="text-muted small">Loading tags…</p>
    </div>

    <template v-else>

        <!-- Tabs -->
       <ul class="nav nav-underline mb-3 align-items-center" role="tablist">
            <li class="nav-item">
                <a class="nav-link active d-flex align-items-center gap-1" data-bs-toggle="tab" href="#pane-tags" style="color: var(--text-color)">
                    <i class="fas fa-tags"></i>
                    Available Tags
                    <span class="badge bg-secondary rounded-pill ms-1">[[ totalTags ]]</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link d-flex align-items-center gap-1" data-bs-toggle="tab" href="#pane-taxonomy" style="color: var(--text-color)">
                    <i class="fas fa-list"></i>Add Taxonomies
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link d-flex align-items-center gap-1" data-bs-toggle="tab" href="#pane-galaxy" style="color: var(--text-color)">
                    <i class="fas fa-atom"></i>Add Galaxies
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link d-flex align-items-center gap-1" data-bs-toggle="tab" href="#pane-update" style="color: var(--text-color)">
                    <i class="fas fa-rotate me-1"></i>Update MISP
                </a>
            </li>

            <!-- spacer -->
            <li class="nav-item ms-auto">
                <button class="btn btn-primary shadow-sm fw-bold rounded-pill px-4"
                        data-bs-toggle="modal" data-bs-target="#add_tag_modal_">
                    <i class="fas fa-plus me-2"></i>Add New Tag
                </button>
            </li>
        </ul>

        <tag-create-modal @tag-created="handleRefreshList" csrf="{{ csrf_token() }}"></tag-create-modal>

        <div class="tab-content">

            <!-- TAB 1 — Tags -->
            <div class="tab-pane fade show active" id="pane-tags">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-3">

                        <tag-filter-bar
                            v-model="filters"
                            :total="totalTags"
                            :selected-count="selectedIds.length"
                            @search="fetchTags(1)"
                            @export-all="exportAll"
                            @export-selected="exportSelected"
                            @delete-selected="bulkDelete"
                            @clear-selection="selectedIds = []"
                            @select-all-visible="selectAllVisible"
                            @set-public-selected="bulkSetVisibility('public')"
                            @set-private-selected="bulkSetVisibility('private')"
                            @activate-selected="bulkSetStatus(true)"
                            @deactivate-selected="bulkSetStatus(false)"
                        ></tag-filter-bar>

                         <browser-pagination
                            :current="currentPage"
                            :total="totalPages"
                            @change="fetchTags"
                        ></browser-pagination>

                        <tag-table
                            :tags="tags"
                            :grouped-tags="filters.source === 'all' ? groupedTags : null"
                            :show-grouped="filters.source === 'all'"
                            :selected="selectedIds"
                            :csrf-token="csrfToken"
                            :loading="tableLoading"
                            :show-namespace="filters.show_namespace"
                            @toggle-select="toggleSelect"
                            @toggle-all="toggleAll"
                            @view-family="openFamilyDrawer"
                            @refresh="fetchTags(currentPage)"
                            @notify="notify"
                        ></tag-table>

                        <browser-pagination
                            :current="currentPage"
                            :total="totalPages"
                            @change="fetchTags"
                        ></browser-pagination>

                    </div>
                </div>
            </div>

            <!-- TAB 2 — Taxonomies -->
            <div class="tab-pane fade" id="pane-taxonomy">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-3">
                        <div class="mb-3">
                            <h6 class="fw-bold mb-0">
                                <i class="fas fa-list me-2 text-primary"></i>MISP Taxonomies
                            </h6>
                            <small class="text-muted">Import structured tag namespaces (TLP, PAP, CERT-XLM…)</small>
                        </div>
                        <taxonomy-browser
                            :csrf-token="csrfToken"
                            @notify="notify"
                            @refresh-main="fetchTags(1)"
                        ></taxonomy-browser>
                    </div>
                </div>
            </div>

            <!-- TAB 3 — Galaxies -->
            <div class="tab-pane fade" id="pane-galaxy">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-3">
                        <div class="mb-3">
                            <h6 class="fw-bold mb-0">
                                <i class="fas fa-atom me-2" style="color:#8b5cf6"></i>MISP Galaxies
                            </h6>
                            <small class="text-muted">Import threat actor clusters, malware families, attack patterns…</small>
                        </div>
                        <galaxy-browser
                            :csrf-token="csrfToken"
                            @notify="notify"
                            @refresh-main="fetchTags(1)"
                        ></galaxy-browser>
                    </div>
                </div>
            </div>

            <!-- TAB 4 — Update MISP -->
            <div class="tab-pane fade" id="pane-update">
                <misp-updater
                    :csrf-token="csrfToken"
                    @notify="notify"
                    @refresh-main="fetchTags(1)"
                ></misp-updater>
            </div>

        </div>
    </template>

    <!-- Family Drawer -->
    <family-drawer
        :show="drawerOpen"
        :source="drawerSource"
        :family="drawerFamily"
        :csrf-token="csrfToken"
        :show-namespace="filters.show_namespace"
        @close="drawerOpen = false"
        @notify="notify"
        @refresh-main="fetchTags(currentPage)"
    ></family-drawer>

</div>
{% endblock %}

{% block script %}
<script type="module">
    const { createApp, ref, computed, onMounted } = Vue;
    import { create_message, message_list } from '/static/js/toaster.js';
    import TagFilterBar      from '/static/js/tags/manage/TagFilterBar.js';
    import { TagTable }      from '/static/js/tags/manage/TagTable.js';
    import FamilyDrawer      from '/static/js/tags/manage/FamilyDrawer.js';
    import TaxonomyBrowser   from '/static/js/tags/manage/TaxonomyBrowser.js';
    import GalaxyBrowser     from '/static/js/tags/manage/GalaxyBrowser.js';
    import BrowserPagination from '/static/js/tags/manage/BrowserPagination.js';
    import TagCreateModal    from '/static/js/tags/tagCreateModal.js';
    import MispUpdater       from '/static/js/tags/manage/MispUpdater.js';

    createApp({
        delimiters: ['[[', ']]'],
        components: {
            'tag-filter-bar':     TagFilterBar,
            'tag-table':          TagTable,
            'family-drawer':      FamilyDrawer,
            'taxonomy-browser':   TaxonomyBrowser,
            'galaxy-browser':     GalaxyBrowser,
            'browser-pagination': BrowserPagination,
            'tag-create-modal':   TagCreateModal,
            'misp-updater':       MispUpdater,
        },
        setup() {
            const csrfToken    = '{{ csrf_token() }}';
            const ready        = ref(false);
            const pageLoading  = ref(false);
            const tableLoading = ref(false);

            const tags        = ref([]);
            const totalTags   = ref(0);
            const totalPages  = ref(1);
            const currentPage = ref(1);
            const selectedIds = ref([]);

            const filters = ref({
                search:         '',
                sort_order:     'desc',
                visibility:     'all',
                is_active:      'all',
                source:         'all',
                per_page:       50,
                show_namespace: true,
            });

            const groupedTags = computed(() => {
                const groups = {};
                for (const tag of tags.value) {
                    const src = tag.source || 'Manual';
                    if (!groups[src]) groups[src] = [];
                    groups[src].push(tag);
                }
                return groups;
            });

            // ── drawer state ──
            const drawerOpen   = ref(false);
            const drawerSource = ref(null);
            const drawerFamily = ref(null);

            function openFamilyDrawer(source, family) {
                drawerSource.value = source;
                drawerFamily.value = family;
                drawerOpen.value   = true;
            }

            // ── notify bridge ──
            function notify(message, toast_class = 'success-subtle') {
                create_message(message, toast_class);
            }

            // ── fetch tags ──
            async function fetchTags(page = 1) {
                tableLoading.value = true;
                try {
                    const params = new URLSearchParams({
                        page,
                        search:     filters.value.search,
                        sort_order: filters.value.sort_order,
                        visibility: filters.value.visibility,
                        is_active:  filters.value.is_active,
                        source:     filters.value.source,
                        per_page:   filters.value.per_page,
                    });
                    const res  = await fetch('/tags/get_tags?' + params);
                    const data = await res.json();
                    if (res.ok) {
                        tags.value        = data.tags;
                        totalTags.value   = data.total_tags;
                        totalPages.value  = data.total_pages;
                        currentPage.value = page;
                    }
                } finally {
                    tableLoading.value = false;
                }
            }

            // ── selection ──
            function toggleSelect(id) {
                const i = selectedIds.value.indexOf(id);
                if (i >= 0) selectedIds.value.splice(i, 1);
                else selectedIds.value.push(id);
            }
            function toggleAll(ids, checked) {
                if (checked) {
                    ids.forEach(id => { if (!selectedIds.value.includes(id)) selectedIds.value.push(id); });
                } else {
                    selectedIds.value = selectedIds.value.filter(id => !ids.includes(id));
                }
            }
            function selectAllVisible() {
                tags.value.forEach(t => {
                    if (!selectedIds.value.includes(t.id)) selectedIds.value.push(t.id);
                });
            }

            // ── bulk: delete ──
            async function bulkDelete() {
                if (!selectedIds.value.length) return;
                const n = selectedIds.value.length;
                if (!confirm(`Are you sure you want to permanently delete ${n} tag(s)? This action cannot be undone.`)) return;
                const res = await fetch('/tags/remove_tags_bulk', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
                    body: JSON.stringify({ ids: selectedIds.value }),
                });
                const data = await res.json();
                if (res.ok) {
                    selectedIds.value = [];
                    await fetchTags(currentPage.value);
                }
                create_message(data.message, res.ok ? 'success-subtle' : 'danger-subtle');
            }

            // ── bulk: visibility ──
            async function bulkSetVisibility(target) {
                if (!selectedIds.value.length) return;
                const n = selectedIds.value.length;
                const label = target === 'public' ? 'public' : 'private';
                if (!confirm(`Are you sure you want to set ${n} tag(s) to ${label}?`)) return;

                // we need each tag's uuid for /tags/toggle_visibility — only flip those
                // whose current visibility differs from the target
                const toFlip = tags.value.filter(t =>
                    selectedIds.value.includes(t.id) && t.visibility !== target
                );
                let ok = 0, fail = 0;
                for (const t of toFlip) {
                    const res = await fetch('/tags/toggle_visibility?' + new URLSearchParams({ tag_uuid: t.uuid }));
                    if (res.ok) ok++; else fail++;
                }
                await fetchTags(currentPage.value);
                if (fail) create_message(`Updated ${ok} tag(s), ${fail} failed.`, 'warning-subtle');
                else      create_message(`Updated ${ok} tag(s) to ${label}.`, 'success-subtle');
            }

            // ── bulk: status ──
            async function bulkSetStatus(activate) {
                if (!selectedIds.value.length) return;
                const n = selectedIds.value.length;
                const verb = activate ? 'activate' : 'deactivate';
                if (!confirm(`Are you sure you want to ${verb} ${n} tag(s)?`)) return;

                const toFlip = tags.value.filter(t =>
                    selectedIds.value.includes(t.id) && t.is_active !== activate
                );
                let ok = 0, fail = 0;
                for (const t of toFlip) {
                    const res = await fetch('/tags/toggle_status?' + new URLSearchParams({ tag_uuid: t.uuid }));
                    if (res.ok) ok++; else fail++;
                }
                await fetchTags(currentPage.value);
                if (fail) create_message(`Updated ${ok} tag(s), ${fail} failed.`, 'warning-subtle');
                else      create_message(`${activate ? 'Activated' : 'Deactivated'} ${ok} tag(s).`, 'success-subtle');
            }

            // ── export ──
            function exportTags(list) {
                const blob = new Blob([JSON.stringify(list, null, 2)], { type: 'application/json' });
                const url  = URL.createObjectURL(blob);
                const a    = Object.assign(document.createElement('a'), {
                    href: url,
                    download: `tags_export_${Date.now()}.json`,
                });
                a.click();
                URL.revokeObjectURL(url);
            }
            function exportSelected() {
                const list = tags.value.filter(t => selectedIds.value.includes(t.id));
                if (!list.length) return;
                if (!confirm(`Export ${list.length} selected tag(s) as JSON?`)) return;
                exportTags(list);
                create_message(`Exported ${list.length} tag(s).`, 'success-subtle');
            }
            function exportAll() {
                if (!tags.value.length) return;
                if (!confirm(`Export all ${tags.value.length} tag(s) currently visible as JSON?`)) return;
                exportTags(tags.value);
                create_message(`Exported ${tags.value.length} tag(s).`, 'success-subtle');
            }

            async function refreshAll() {
                pageLoading.value = true;
                await fetchTags(currentPage.value);
                pageLoading.value = false;
            }

            onMounted(async () => {
                await fetchTags(1);
                ready.value = true;
            });

            const handleRefreshList = (newlyCreatedTag) => {
                fetchTags(1); // Refresh to show the new tag
                create_message("Tag saved successfully.", "success-subtle");
            };

            return {
                message_list,
                csrfToken, ready, pageLoading, tableLoading,
                tags, totalTags, totalPages, currentPage, filters,
                groupedTags, selectedIds,
                drawerOpen, drawerSource, drawerFamily, openFamilyDrawer,
                notify,
                fetchTags, toggleSelect, toggleAll, selectAllVisible,
                bulkDelete, bulkSetVisibility, bulkSetStatus,
                exportSelected, exportAll, refreshAll, handleRefreshList
            };
        }
    }).mount('#main-container');
</script>
{% endblock %}
