{% extends 'base.html' %}
{% block head %}
<link rel="stylesheet" type="text/css" href="{{ url_for('static',filename='css/rule/proposal.css') }}">
{% endblock %}

{% block content %}
<div class="container mt-4" id="main-container" v-cloak>

    <div class="explorer-banner mb-5">
        <i class="fa-solid fa-code-branch banner-watermark"></i>
        <div class="d-flex align-items-center gap-3 mb-3">
            <div class="banner-icon">
                <i class="fa-solid fa-code-branch"></i>
            </div>
            <div>
                <h2 class="fw-bold mb-1">Rule Change Proposals</h2>
                <div class="banner-accent"></div>
            </div>
        </div>
        <p class="text-muted mb-0" style="max-width: 600px; font-size: 0.95rem;">
            Manage and review proposed edits to existing rules.
        </p>
    </div>

    <ul class="nav nav-underline justify-content-center w-100 mb-4" role="tablist">
        <li class="nav-item flex-fill text-center">
            <a class="nav-link active fw-bold px-4" data-bs-toggle="tab" href="#pane-all" role="tab"
                style="color: var(--text-color);">
                <i class="fas fa-list me-2"></i>All Proposals
                <span v-if="pendingCount > 0" class="badge rounded-pill ms-1"
                    style="font-size: 0.6rem; background: #dc3545; color: white; vertical-align: top; margin-top: 2px;">
                    [[ pendingCount ]]
                </span>
            </a>
        </li>
        <li class="nav-item flex-fill text-center">
            <a class="nav-link fw-bold px-4" data-bs-toggle="tab" href="#pane-mine" role="tab"
                style="color: var(--text-color);">
                <i class="fas fa-user me-2"></i>My Submissions
            </a>
        </li>
    </ul>

    <div class="tab-content">

        <!-- ── Tab 1 : Pending ── -->
        <div class="tab-pane fade show active" id="pane-all" role="tabpanel">
            <div class="card card-body shadow-sm border-0">
                <proposal-history-table :csrf-token="'{{ csrf_token() }}'"
                    api-endpoint="/rule/get_rules_propose_edit_history_page" submit-endpoint="/rule/manage_proposals"
                    :show-manage="true" @view-diff="loadDiffInModal" @decision-made="fetchPendingCount">
                </proposal-history-table>
            </div>
        </div>

        <!-- ── My submissions ── -->
        <div class="tab-pane fade" id="pane-mine" role="tabpanel">
            <div class="card card-body shadow-sm border-0">
                <proposal-history-table :csrf-token="'{{ csrf_token() }}'" api-endpoint="/rule/get_my_proposals"
                    :show-manage="false" @view-diff="loadDiffInModal">
                </proposal-history-table>
            </div>
        </div>

    </div>

    <!-- Diff Modal -->
    <div class="modal fade" id="fullscreenDiffModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-code-branch me-2 text-primary"></i>
                        Changes for: [[ selectedRuleName ]]
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0">
                    <div id="modalDiffContainer"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

</div>
{% endblock %}

{% block script %}
<script type="module">
    const { createApp, ref, nextTick } = Vue;
    import { message_list } from '/static/js/toaster.js';
    import { renderDiff } from "/static/js/diff_macro.js";
    import ProposalHistoryTable from '/static/js/rule/proposal/ProposalHistoryTable.js';

    createApp({
        delimiters: ['[[', ']]'],
        components: {
            'proposal-history-table': ProposalHistoryTable,
        },
        setup() {
            const renderedDiffs = new Set();
            const selectedRuleName = ref('');

            const pendingCount = ref(0);

            async function fetchPendingCount() {
                const res = await fetch('/rule/get_rules_propose_edit_page?page=1');
                if (res.ok) {
                    const data = await res.json();
                    pendingCount.value = data.total_count || 0;
                }
            }
            fetchPendingCount();

            async function loadDiffInModal(rule) {
                selectedRuleName.value = rule.rule_name;
                if (renderedDiffs.has(rule.id)) return;
                await nextTick(() => {
                    renderDiff(
                        rule.old_content.trim(),
                        rule.proposed_content.trim(),
                        'modalDiffContainer',
                        "oneText"
                    );
                    renderedDiffs.add(rule.id);
                });
            }

            return { message_list, selectedRuleName, loadDiffInModal, pendingCount, fetchPendingCount };
        }
    }).mount('#main-container');
</script>
{% endblock %}
