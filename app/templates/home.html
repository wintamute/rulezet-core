{% extends 'base.html' %}
{% block title %}Security Intelligence Repository — Rulezet{% endblock %}
{% import 'macros/form_macros.html' as f %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/rule/rulesCarousel.css') }}">
<style>
.feed-item { border-radius: .75rem; transition: all .15s; border: 1px solid transparent; }
.feed-item:hover { background: var(--bs-primary-bg-subtle, rgba(13,110,253,.06)) !important;
                   border-color: rgba(13,110,253,.12); cursor: pointer; }
.feed-item.no-link:hover { background: transparent !important; border-color: transparent; cursor: default; }
.feed-icon { width: 38px; height: 38px; display:flex; align-items:center; justify-content:center;
             border-radius: 50%; flex-shrink: 0; font-size: .9rem; }
.feed-scroll { max-height: 360px; overflow-y: auto; scrollbar-width: thin; }
.feed-scroll::-webkit-scrollbar { width: 4px; }
.feed-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); border-radius: 4px; }
.feed-username { font-weight: 600; color: var(--bs-primary); text-decoration:none; }
.feed-username:hover { text-decoration: underline; }
.feed-dot { width:6px; height:6px; border-radius:50%; background:#198754; display:inline-block; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }
.feed-dot { animation: pulse-dot 2s ease infinite; }
</style>
{% endblock %}

{% block content %}
<div class="container py-5" id="main-container">
    <template v-if="is_loading">

        <!-- ── Hero ── -->
        <div class="row mb-4 align-items-center">
            <div class="col-lg-8">
                <h1 class="display-5 fw-bold text-dark mb-2">
                    Security Intelligence <span class="text-primary">Repository </span>
                    <small class="fw-light opacity-50">with </small>
                    <span class="rulezet-brand"> RULEZET</span>
                    <span class="badge rounded-pill bg-light text-muted fw-normal border ms-2"
                        style="font-size: 0.9rem; vertical-align: middle;">v{{ app_version }}</span>
                </h1>
                <p class="lead text-muted">
                    <a href="/why_choose_rulezet" class="ms-2" title="Why choose Rulezet?"
                        style="font-size:medium; vertical-align: middle; text-decoration: underline;">
                        <i class="fa-solid fa-question-circle text-muted"></i> Why choose Rulezet?
                    </a><br>
                    Explore the latest community-contributed detection rules. Stay ahead of threats with real-time updates.
                </p>
            </div>
        </div>

        <!-- ── Two-column layout: cards + feed ── -->
        <div class="row g-4 mb-4 align-items-stretch">

            <!-- Left — 3 vertical action cards -->
            <div class="col-lg-7 d-flex flex-column gap-3">

                <a href="/rule/rules_list" class="text-decoration-none flex-fill">
                <div class="p-3 rounded-4 shadow-sm d-flex align-items-center gap-3 h-100"
                     style="background-color:var(--card-bg-color);border-left:4px solid #0d6efd;">
                    <div class="rounded-circle bg-primary-subtle d-flex align-items-center justify-content-center flex-shrink-0"
                         style="width:44px;height:44px;">
                        <i class="fa-solid fa-magnifying-glass-chart text-primary"></i>
                    </div>
                    <div>
                        <div class="fw-bold" style="color:var(--bs-body-color);">Explore Intelligence</div>
                        <div class="text-muted small">Browse YARA, Sigma and other detection rules shared by the community.</div>
                    </div>
                    <i class="fa-solid fa-arrow-right text-primary ms-auto opacity-50"></i>
                </div>
                </a>

                <a href="/rule/create_rule" class="text-decoration-none flex-fill">
                <div class="p-3 rounded-4 shadow-sm d-flex align-items-center gap-3 h-100"
                     style="background-color:var(--card-bg-color);border-left:4px solid #198754;">
                    <div class="rounded-circle bg-success-subtle d-flex align-items-center justify-content-center flex-shrink-0"
                         style="width:44px;height:44px;">
                        <i class="fa-solid fa-plus text-success"></i>
                    </div>
                    <div>
                        <div class="fw-bold" style="color:var(--bs-body-color);">Contribute Rules</div>
                        <div class="text-muted small">Upload your own detection assets and help the security community.</div>
                    </div>
                    <i class="fa-solid fa-arrow-right text-success ms-auto opacity-50"></i>
                </div>
                </a>

                <a href="/bundle/list" class="text-decoration-none flex-fill">
                <div class="p-3 rounded-4 shadow-sm d-flex align-items-center gap-3 h-100"
                     style="background-color:var(--card-bg-color);border-left:4px solid #ffc107;">
                    <div class="rounded-circle bg-warning-subtle d-flex align-items-center justify-content-center flex-shrink-0"
                         style="width:44px;height:44px;">
                        <i class="fa-solid fa-boxes text-warning"></i>
                    </div>
                    <div>
                        <div class="fw-bold" style="color:var(--bs-body-color);">Bundle Rules</div>
                        <div class="text-muted small">Organize detection assets into bundles for easy sharing and management.</div>
                    </div>
                    <i class="fa-solid fa-arrow-right text-warning ms-auto opacity-50"></i>
                </div>
                </a>

            </div>

            <!-- Right — public activity feed (10 max, no pagination) -->
            <div class="col-lg-5">
                <div class="card border-0 shadow-sm rounded-4 h-100" style="background-color: var(--card-bg-color);">
                    <div class="card-body p-3 d-flex flex-column">

                        <!-- Header -->
                        <div class="d-flex align-items-center justify-content-between mb-3 flex-shrink-0">
                            <div class="d-flex align-items-center gap-2">
                                <span class="feed-dot"></span>
                                <h5 class="fw-bold mb-0">Community Activity</h5>
                            </div>
                            <span class="badge rounded-pill border text-muted fw-normal"
                                  style="font-size:.72rem;background:var(--card-bg-color);">
                                [[ feed.length ]] events
                            </span>
                        </div>

                        <!-- Loading -->
                        <template v-if="feedLoading">
                            <div class="d-flex align-items-center justify-content-center flex-grow-1">
                                <div class="text-center text-muted">
                                    <div class="spinner-border spinner-border-sm text-primary mb-2"></div>
                                    <p class="small mb-0">Loading activity…</p>
                                </div>
                            </div>
                        </template>

                        <!-- Empty -->
                        <template v-else-if="feed.length === 0">
                            <div class="d-flex align-items-center justify-content-center flex-grow-1">
                                <div class="text-center text-muted py-4">
                                    <i class="fa-solid fa-satellite-dish fa-2x mb-3 d-block opacity-25"></i>
                                    <p class="small mb-0">No public activity yet.<br>Be the first to contribute!</p>
                                </div>
                            </div>
                        </template>

                        <!-- Feed list -->
                        <div v-else class="feed-scroll flex-grow-1">
                            <div v-for="(item, idx) in feed" :key="item.id"
                                :class="['feed-item d-flex align-items-start gap-3 p-2 px-3 mb-1',
                                         feedUrl(item) ? '' : 'no-link']"
                                @click="feedUrl(item) && openFeedItem(item)">

                                <!-- Icon bubble -->
                                <div class="feed-icon mt-1 shadow-sm" :style="feedBubbleStyle(item.action)">
                                    <i :class="item.icon || 'fa-solid fa-circle-dot'" style="font-size:.85rem;"></i>
                                </div>

                                <!-- Content -->
                                <div class="flex-grow-1 min-width-0">
                                    <div class="d-flex align-items-baseline gap-1 flex-wrap">
                                        <a v-if="item.user_id"
                                           :href="'/account/detail_user/' + item.user_id"
                                           class="feed-username small"
                                           @click.stop>[[ item.username ]]</a>
                                        <span v-else class="feed-username small text-muted">Someone</span>
                                        <span class="text-muted small">[[ friendlyAction(item.action) ]]</span>
                                    </div>
                                    <p v-if="item.description" class="mb-0 text-truncate"
                                       style="font-size:.78rem;color:var(--bs-secondary-color,#6c757d);max-width:95%;"
                                       :title="item.description">
                                        [[ item.description ]]
                                    </p>
                                    <div class="d-flex align-items-center gap-2 mt-1">
                                        <small class="text-muted" style="font-size:.7rem;">
                                            <i class="fa-regular fa-clock me-1 opacity-50"></i>[[ formatTime(item.created_at) ]]
                                        </small>
                                        <span v-if="feedUrl(item)"
                                              class="badge rounded-pill text-muted border"
                                              style="font-size:.62rem;background:var(--card-bg-color);">
                                            <i class="fa-solid fa-arrow-up-right-from-square me-1"></i>view
                                        </span>
                                    </div>
                                </div>

                            </div>

                        </div>

                    </div>
                </div>
            </div>

        </div><!-- end 2-col -->

        <hr class="fading-line-2 my-5">

        <div class="d-flex align-items-center justify-content-between mb-4">
            <h4 class="fw-bold mb-0">Recently Added <span class="text-primary">Intelligence</span></h4>
            <p class="text-muted small mb-0 d-none d-lg-block">Review the latest 12 assets updated by the community.</p>
        </div>

        <rules-carousel route="/get_last_rules" :current-user-id="currentUserId"
            :current-user-is-admin="current_user_is_admin" :current-user-is-connected="current_user_is_connected">
        </rules-carousel>

        <hr class="opacity-10 mb-5 mt-5">
        <div class="d-flex align-items-center justify-content-between mb-4">
            <h4 class="fw-bold mb-0">Recently CVE <span class="text-primary">reports</span></h4>
            <p class="text-muted small mb-0 d-none d-lg-block">Review the latest 12 assets connected with CVE.</p>
        </div>

        <rules-carousel route="/rule/get_last_cve_rules" :current-user-id="currentUserId"
            :current-user-is-admin="current_user_is_admin" :current-user-is-connected="current_user_is_connected">
        </rules-carousel>

        <div class="text-center mt-5 mb-4">
            <a href="/rule/rules_list" class="btn btn-more-rules px-4 py-2 rounded-pill fw-bold">
                <span>See more rules</span>
                <i class="fa-solid fa-arrow-right ms-2 transition-arrow"></i>
            </a>
        </div>

    </template>

    <template v-else>
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </template>
</div>
{% endblock %}

{% block script %}
<script type="module">
    const { createApp, ref, onMounted } = Vue
    import { message_list, create_message } from '/static/js/toaster.js'
    import RulesCarousel from '/static/js/rule/rulesCarousel.js'

    // ── Action → friendly label ──────────────────────────────────────────────
    const ACTION_LABELS = {
        'rule.create':            'created a rule',
        'rule.edit':              'edited a rule',
        'rule.vote_up':           'upvoted a rule',
        'rule.vote_down':         'downvoted a rule',
        'rule.favorite':          'favorited a rule',
        'rule.download':          'downloaded a rule',
        'bundle.create':          'created a bundle',
        'bundle.edit':            'updated a bundle',
        'comment.add':            'commented',
        'user.register':          'joined Rulezet',
        'tag.create':             'created a tag',
        'github.import_started':  'started a GitHub import',
    }

    // ── Action → bubble color ────────────────────────────────────────────────
    const ACTION_COLORS = {
        'rule':    { bg: 'rgba(13,110,253,.12)',  color: '#0d6efd' },
        'bundle':  { bg: 'rgba(255,193,7,.15)',   color: '#ca8a04' },
        'comment': { bg: 'rgba(25,135,84,.12)',   color: '#198754' },
        'user':    { bg: 'rgba(108,117,125,.12)', color: '#6c757d' },
        'tag':     { bg: 'rgba(111,66,193,.12)',  color: '#6f42c1' },
    }

    function feedBubbleStyle(action) {
        const prefix = action.split('.')[0]
        const c = ACTION_COLORS[prefix] || { bg: 'rgba(108,117,125,.1)', color: '#6c757d' }
        return `background:${c.bg};color:${c.color};`
    }

    function friendlyAction(action) {
        return ACTION_LABELS[action] || action.replace('.', ' ').replace(/_/g, ' ')
    }

    function feedUrl(item) {
        if (item.target_type === 'rule') {
            if (item.target_uuid) return `/rule/detail_rule/${item.target_uuid}`
            if (item.target_id)   return `/rule/detail_rule/${item.target_id}`
        }
        if (item.target_type === 'bundle') {
            if (item.target_uuid) return `/bundle/detail/${item.target_uuid}`
            if (item.target_id)   return `/bundle/detail/${item.target_id}`
        }
        if (item.target_type === 'user' && item.target_id)
            return `/account/detail_user/${item.target_id}`
        if (item.action === 'github.import_started' && item.extra?.url)
            return `/rule/github_detail?url=${encodeURIComponent(item.extra.url)}`
        if (item.target_type === 'comment' && item.target_id) {
            const base = item.extra?.rule_uuid  ? `/rule/detail_rule/${item.extra.rule_uuid}`
                       : item.extra?.rule_id    ? `/rule/detail_rule/${item.extra.rule_id}` : null
            if (base) return `${base}?comment=${item.target_id}`
        }
        if (item.target_type === 'bundle_comment' && item.target_id) {
            const base = item.extra?.bundle_uuid ? `/bundle/detail/${item.extra.bundle_uuid}`
                       : item.extra?.bundle_id   ? `/bundle/detail/${item.extra.bundle_id}` : null
            if (base) return `${base}?comment=${item.target_id}`
        }
        return null
    }

    function formatTime(ts) {
        if (!ts) return ''
        // dayjs is loaded globally — handles UTC correctly
        return dayjs.utc(ts).fromNow()
    }

    createApp({
        delimiters: ['[[', ']]'],
        components: { 'rules-carousel': RulesCarousel },
        setup() {
            const is_loading              = ref(false)
            const current_user_is_admin   = ref(false)
            const current_user_is_connected = ref(false)
            const currentUserId           = ref(null)

            // ── Feed ────────────────────────────────────────────────────────
            const feed        = ref([])
            const feedLoading = ref(true)

            async function fetchFeed() {
                feedLoading.value = true
                try {
                    const res  = await fetch('/activity_feed?page=1&per_page=10')
                    const data = await res.json()
                    feed.value = data.logs || []
                } catch {}
                feedLoading.value = false
            }

            function openFeedItem(item) {
                const url = feedUrl(item)
                if (url) window.open(url, '_blank')
            }

            // ── User detection ───────────────────────────────────────────────
            async function checkIfUserIsConnected() {
                const res = await fetch('/get_current_user_connected')
                const data = await res.json()
                current_user_is_connected.value = data.is_authenticated
                if (data.is_authenticated) {
                    const userRes = await fetch('/rule/get_current_user')
                    const userData = await userRes.json()
                    current_user_is_admin.value = userData.user
                    currentUserId.value = userData.id ?? null
                }
            }

            async function init() {
                is_loading.value = false
                await checkIfUserIsConnected()
                is_loading.value = true
                fetchFeed()
            }

            onMounted(() => init())

            return {
                message_list, is_loading,
                current_user_is_admin, current_user_is_connected, currentUserId,
                feed, feedLoading,
                fetchFeed, openFeedItem,
                feedBubbleStyle, friendlyAction, feedUrl, formatTime,
            }
        }
    }).mount('#main-container')
</script>
{% endblock %}
