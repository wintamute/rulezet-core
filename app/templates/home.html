{% extends 'base.html' %}
{% import 'macros/form_macros.html' as f %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/rule/rulesCarousel.css') }}">
{% endblock %}

{% block content %}
<div class="container py-5" id="main-container">
    <template v-if="is_loading">
        <div class="row mb-5 align-items-center">
            <div class="col-lg-8">
                <h1 class="display-5 fw-bold text-dark mb-2">
                    Security Intelligence <span class="text-primary">Repository </span>
                    <small class="fw-light opacity-50">with </small>
                    <span class="rulezet-brand"> RULEZET</span>
                    <span class="badge rounded-pill bg-light text-muted fw-normal border ms-2"
                        style="font-size: 0.9rem; vertical-align: middle;">
                        v1.5.0
                    </span>
                </h1>
                <p class="lead text-muted">
                    <a href="/why_choose_rulezet" class="ms-2" title="Why choose Rulezet?"
                        style="font-size:medium; vertical-align: middle; text-decoration: underline;">
                        <i class="fa-solid fa-question-circle text-muted"></i> Why choose Rulezet?
                    </a>
                    <br>
                    Explore the latest community-contributed detection rules. Stay ahead of threats with
                    real-time updates.
                </p>
            </div>

            <div class="row g-4 mb-5">
                <div class="col-md-4">
                    <div class="p-4 rounded-4 border-start border-primary border-4 shadow-sm h-100"
                        style="background-color: var(--card-bg-color);">
                        <div class="d-flex align-items-center mb-3">
                            <div class="icon-shape bg-primary-subtle text-primary rounded-circle p-2 me-3">
                                <i class="fa-solid fa-magnifying-glass-chart"></i>
                            </div>
                            <h6 class="fw-bold mb-0">Explore Intelligence</h6>
                        </div>
                        <p class="small text-muted mb-3">Browse our curated database of YARA, Sigma, and other rules
                            shared by security experts worldwide.</p>
                        <a href="/rule/rules_list" class="text-primary text-decoration-none small fw-bold underline">
                            View full catalog <i class="fa-solid fa-arrow-right ms-1"></i>
                        </a>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="p-4 rounded-4 border-start border-success border-4 shadow-sm h-100"
                        style="background-color: var(--card-bg-color);">
                        <div class="d-flex align-items-center mb-3">
                            <div class="icon-shape bg-success-subtle text-success rounded-circle p-2 me-3">
                                <i class="fa-solid fa-plus"></i>
                            </div>
                            <h6 class="fw-bold mb-0">Contribute Rules</h6>
                        </div>
                        <p class="small text-muted mb-3">Join the defense community! Upload your own detection assets to
                            help others track emerging threats.</p>
                        <a href="/rule/create_rule" class="text-success text-decoration-none small fw-bold underline">
                            Submit an asset <i class="fa-solid fa-arrow-right ms-1"></i>
                        </a>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="p-4 rounded-4 border-start border-warning border-4 shadow-sm h-100"
                        style="background-color: var(--card-bg-color);">
                        <div class="d-flex align-items-center mb-3">
                            <div class="icon-shape bg-warning-subtle text-warning rounded-circle p-2 me-3">
                                <i class="fa-solid fas fas fa-boxes"></i>
                            </div>
                            <h6 class="fw-bold mb-0">Bundle Rules</h6>
                        </div>
                        <p class="small text-muted mb-3">Organize your detection assets into bundles for easy sharing
                            and management.</p>
                        <a href="/bundle/list" class="text-warning text-decoration-none small fw-bold underline">
                            Go to bundles <i class="fa-solid fa-arrow-right ms-1"></i>
                        </a>
                    </div>
                </div>
            </div>

            <hr class="opacity-10 mb-5 mt-5">

            <div class="d-flex align-items-center justify-content-between mb-4">
                <h4 class="fw-bold mb-0">Recently Added <span class="text-primary">Intelligence</span></h4>
                <p class="text-muted small mb-0 d-none d-lg-block">Review the latest 12 assets updated by the community.
                </p>
            </div>

            <rules-carousel route="/get_last_rules" :current-user-id="currentUserId"
                :current-user-is-admin="current_user_is_admin" :current-user-is-connected="current_user_is_connected">
            </rules-carousel>

            <hr class="opacity-10 mb-5 mt-5">
            <div class="d-flex align-items-center justify-content-between mb-4">
                <h4 class="fw-bold mb-0">Recently CVE <span class="text-primary">reports</span></h4>
                <p class="text-muted small mb-0 d-none d-lg-block">Review the latest 12 assets connected with CVE.</p>
            </div>

            <rules-carousel route="/rule/get_last_cve_rules" :current-user-id="currentUserId"
                :current-user-is-admin="current_user_is_admin" :current-user-is-connected="current_user_is_connected">
            </rules-carousel>



            <div class="text-center mt-5 mb-4">
                <a href="/rule/rules_list" class="btn btn-more-rules px-4 py-2 rounded-pill fw-bold">
                    <span>See more rules</span>
                    <i class="fa-solid fa-arrow-right ms-2 transition-arrow"></i>
                </a>
            </div>

    </template>

    <template v-else>
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </template>
</div>
{% endblock %}

{% block script %}
<script type="module">
    const { createApp, ref, onMounted } = Vue
    import { message_list, create_message } from '/static/js/toaster.js'
    import RulesCarousel from '/static/js/rule/rulesCarousel.js'

    createApp({
        delimiters: ['[[', ']]'],
        components: {
            'rules-carousel': RulesCarousel,
        },
        setup() {
            const is_loading = ref(false)
            const current_user_is_admin = ref(false)
            const current_user_is_connected = ref(false)
            const currentUserId = ref(null)

            async function checkIfUserIsConnected() {
                const res = await fetch('/get_current_user_connected')
                const data = await res.json()
                current_user_is_connected.value = data.is_authenticated
                if (data.is_authenticated) {
                    const userRes = await fetch('/rule/get_current_user')
                    const userData = await userRes.json()
                    current_user_is_admin.value = userData.user
                    currentUserId.value = userData.id ?? null
                }
            }

            async function init() {
                is_loading.value = false
                await checkIfUserIsConnected()
                is_loading.value = true
            }

            onMounted(() => init())

            return {
                message_list,
                is_loading,
                current_user_is_admin,
                current_user_is_connected,
                currentUserId,
            }
        }
    }).mount('#main-container')
</script>
{% endblock %}
